<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>OPSHE Beauty AR</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; height:100vh; font-family:system-ui,sans-serif; color:#fff; }
#container { position:relative; width:100vw; height:100vh; }
#video  { position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transform:scaleX(-1); }
#canvas { position:absolute; inset:0; width:100%; height:100%; transform:scaleX(-1); }
#loading { position:fixed; inset:0; background:#0f0f14; display:flex; flex-direction:column;
           align-items:center; justify-content:center; z-index:100; }
#loading h2 { font-size:22px; margin-bottom:12px; color:#e8607a; }
.spinner { width:48px; height:48px; border:3px solid #2e2e42;
           border-top-color:#e8607a; border-radius:50%;
           animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
#ui { position:fixed; bottom:0; left:0; right:0; z-index:50;
      background:linear-gradient(transparent, rgba(0,0,0,.9));
      padding:12px 12px 20px; }
.brand-scroll { display:flex; gap:8px; overflow-x:auto; padding-bottom:8px;
                margin-bottom:10px; scrollbar-width:none; }
.brand-scroll::-webkit-scrollbar { display:none; }
.brand-btn { flex-shrink:0; padding:5px 14px; border-radius:100px;
             border:1.5px solid #444; background:rgba(30,30,40,.8);
             color:#888; font-size:13px; cursor:pointer; transition:all .2s; }
.brand-btn.active { border-color:#e8607a; color:#e8607a; background:rgba(232,96,122,.15); }
.shade-scroll { display:flex; gap:10px; overflow-x:auto; padding-bottom:8px; scrollbar-width:none; }
.shade-scroll::-webkit-scrollbar { display:none; }
.shade-item { flex-shrink:0; display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; }
.shade-circle { width:38px; height:38px; border-radius:50%; border:2.5px solid transparent; transition:all .2s; }
.shade-circle.active { border-color:#fff; transform:scale(1.2); box-shadow:0 0 10px rgba(255,255,255,.4); }
.shade-label { font-size:9px; color:#888; text-align:center; max-width:44px; line-height:1.2; }
.controls { display:flex; align-items:center; gap:10px; margin-top:8px; flex-wrap:wrap; }
.controls label { font-size:12px; color:#888; white-space:nowrap; }
input[type=range] { flex:1; accent-color:#e8607a; min-width:80px; }
.oval { font-size:12px; color:#e8607a; width:30px; }
select { background:#1a1a24; border:1px solid #333; color:#fff;
         border-radius:6px; padding:3px 6px; font-size:12px; }
#infoBar { position:fixed; top:0; left:0; right:0; z-index:50; padding:10px 14px;
           background:linear-gradient(rgba(0,0,0,.7),transparent);
           display:flex; justify-content:space-between; align-items:center; }
.logo { font-weight:700; color:#e8607a; font-size:16px; }
#selInfo { font-size:11px; color:#ddd; text-align:right; line-height:1.5; }
#selInfo b { color:#e8607a; }
#statusDot { position:fixed; top:14px; left:50%; transform:translateX(-50%);
             z-index:60; font-size:12px; color:#4caf82; background:rgba(0,0,0,.6);
             padding:3px 12px; border-radius:100px; display:none; }
#flashEl { position:fixed; inset:0; background:white; z-index:200;
           opacity:0; pointer-events:none; transition:opacity 0.1s; }
#photoModal { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92);
              z-index:300; flex-direction:column; align-items:center; justify-content:center;
              padding:20px; }
#photoResult { max-width:90vw; max-height:65vh; border-radius:12px; object-fit:contain; }
.modal-hint { color:#aaa; font-size:13px; margin-top:14px; text-align:center; }
.modal-btns { display:flex; gap:12px; margin-top:16px; }
.modal-btns button { padding:10px 24px; border:none; border-radius:8px;
                     font-size:14px; cursor:pointer; font-weight:600; }
.btn-download { background:#e8607a; color:white; }
.btn-close    { background:#333; color:white; }
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <h2 style="margin-top:20px">⬡ OPSHE Beauty AR</h2>
  <p id="loadTxt">Memuat face detection...</p>
</div>

<div id="container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div id="infoBar">
  <div class="logo">⬡ OPSHE</div>
  <div id="selInfo">Pilih shade untuk mencoba</div>
</div>

<div id="statusDot">● Face detected</div>

<button onclick="capturePhoto()" style="
  position:fixed; right:16px; top:50%; transform:translateY(-50%);
  z-index:60; width:56px; height:56px; border-radius:50%;
  background:#e8607a; border:3px solid rgba(255,255,255,.3); cursor:pointer;
  font-size:24px; box-shadow:0 4px 16px rgba(232,96,122,.5);">📸</button>

<div id="flashEl"></div>

<div id="photoModal">
  <img id="photoResult" src="" alt="Foto">
  <p class="modal-hint">📥 Tekan lama pada foto → <strong style="color:#fff">Save Image</strong></p>
  <div class="modal-btns">
    <button class="btn-download" onclick="downloadPhoto()">💾 Download</button>
    <button class="btn-close" onclick="closePhoto()">✕ Tutup</button>
  </div>
</div>

<div id="ui">
  <div class="brand-scroll" id="brandRow"></div>
  <div class="shade-scroll" id="shadeRow"></div>
  <div class="controls">
    <label>Opacity</label>
    <input type="range" id="opSlider" min="10" max="90" value="60">
    <span class="oval" id="opVal">60%</span>
    <label>Finish</label>
    <select id="finSel">
      <option value="matte">Matte</option>
      <option value="gloss">Gloss</option>
      <option value="satin">Satin</option>
    </select>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script>
const API     = window.location.origin + '/api/v1';
const UPPER   = [61,185,40,39,37,0,267,269,270,409,291,375,321,405,314,17,84,181,91,146,61];
const LOWER   = [78,95,88,178,87,14,317,402,318,324,308,415,310,311,312,13,82,81,80,191,78];
const INNER   = [78,191,80,81,82,13,312,311,310,415,308,324,318,402,317,14,87,178,88,95];

const video     = document.getElementById('video');
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const loadEl    = document.getElementById('loading');
const loadTxt   = document.getElementById('loadTxt');
const brandRow  = document.getElementById('brandRow');
const shadeRow  = document.getElementById('shadeRow');
const opSlider  = document.getElementById('opSlider');
const opVal     = document.getElementById('opVal');
const finSel    = document.getElementById('finSel');
const selInfo   = document.getElementById('selInfo');
const statusDot = document.getElementById('statusDot');

let shade         = null;
let opacity       = 0.60;
let finish        = 'matte';
let landmarks     = null;
let prevLandmarks = null;
let lastPhotoUrl  = null;
const SMOOTH      = 0.55;

function hexRgb(hex) {
  const h = hex.replace('#','');
  return { r:parseInt(h.slice(0,2),16), g:parseInt(h.slice(2,4),16), b:parseInt(h.slice(4,6),16) };
}

function pts(lm, idx) {
  return idx.map(i => ({ x: lm[i].x * canvas.width, y: lm[i].y * canvas.height }));
}

function drawPath(c, points) {
  c.beginPath();
  c.moveTo(points[0].x, points[0].y);
  for (let i=1; i<points.length-1; i++) {
    const xc = (points[i].x + points[i+1].x) / 2;
    const yc = (points[i].y + points[i+1].y) / 2;
    c.quadraticCurveTo(points[i].x, points[i].y, xc, yc);
  }
  c.lineTo(points[0].x, points[0].y);
  c.closePath();
}

function makeOffscreen() {
  const off = document.createElement('canvas');
  off.width  = canvas.width;
  off.height = canvas.height;
  return [off, off.getContext('2d')];
}

function drawLip() {
  if (!shade || !landmarks) return;

  const rgb    = hexRgb(shade.hex);
  const upAdj  = pts(landmarks, UPPER).map(p => ({x:p.x, y:p.y-1}));
  const loAdj  = pts(landmarks, LOWER).map(p => ({x:p.x, y:p.y-1}));
  const inner  = pts(landmarks, INNER);
  const mouthH = Math.abs(landmarks[14].y - landmarks[13].y) * canvas.height;

  const [off, oc] = makeOffscreen();

  if (finish === 'gloss') {
    // Base color
    oc.globalCompositeOperation = 'source-over';
    oc.globalAlpha = opacity * 0.75;
    oc.fillStyle = `rgb(${rgb.r},${rgb.g},${rgb.b})`;
    drawPath(oc, upAdj); oc.fill();
    drawPath(oc, loAdj); oc.fill();
    // Potong gigi
    if (mouthH > 8) {
      oc.globalCompositeOperation = 'destination-out';
      oc.globalAlpha = 1;
      drawPath(oc, inner); oc.fill();
    }
    // Gloss highlight di offscreen terpisah
    const [off2, oc2] = makeOffscreen();
    const ctr = loAdj.reduce((s,p)=>({x:s.x+p.x,y:s.y+p.y}),{x:0,y:0});
    ctr.x /= loAdj.length; ctr.y /= loAdj.length;
    const g = oc2.createRadialGradient(ctr.x,ctr.y-2,1,ctr.x,ctr.y,22);
    g.addColorStop(0,'rgba(255,255,255,0.9)');
    g.addColorStop(1,'rgba(255,255,255,0)');
    oc2.globalAlpha = 0.28;
    drawPath(oc2, loAdj);
    oc2.fillStyle = g; oc2.fill();
    // Potong gigi di highlight
    if (mouthH > 8) {
      oc2.globalCompositeOperation = 'destination-out';
      oc2.globalAlpha = 1;
      drawPath(oc2, inner); oc2.fill();
    }
    // Merge highlight
    oc.globalCompositeOperation = 'source-over';
    oc.globalAlpha = 1;
    oc.drawImage(off2, 0, 0);

  } else if (finish === 'satin') {
    oc.globalAlpha = opacity * 0.72;
    oc.fillStyle = `rgb(${rgb.r},${rgb.g},${rgb.b})`;
    drawPath(oc, upAdj); oc.fill();
    drawPath(oc, loAdj); oc.fill();
    oc.globalAlpha = 0.08;
    oc.fillStyle = 'rgba(255,255,255,0.5)';
    drawPath(oc, upAdj); oc.fill();
    drawPath(oc, loAdj); oc.fill();
    // Potong gigi
    if (mouthH > 8) {
      oc.globalCompositeOperation = 'destination-out';
      oc.globalAlpha = 1;
      drawPath(oc, inner); oc.fill();
    }

  } else {
    // Matte
    oc.globalAlpha = opacity * 0.80;
    oc.fillStyle = `rgb(${rgb.r},${rgb.g},${rgb.b})`;
    drawPath(oc, upAdj); oc.fill();
    drawPath(oc, loAdj); oc.fill();
    // Potong gigi
    if (mouthH > 8) {
      oc.globalCompositeOperation = 'destination-out';
      oc.globalAlpha = 1;
      drawPath(oc, inner); oc.fill();
    }
  }

  // Tempel ke canvas utama
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.drawImage(off, 0, 0);
  ctx.restore();
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// ─── Capture Photo ─────────────────────────────────────────────────────────

function capturePhoto() {
  // Flash
  const flash = document.getElementById('flashEl');
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 150);

  // Buat canvas output
  const out    = document.createElement('canvas');
  out.width    = canvas.width;
  out.height   = canvas.height;
  const oc     = out.getContext('2d');

  // Gambar video (flip balik karena video sudah mirror di CSS)
  oc.save();
  oc.scale(-1,1);
  oc.drawImage(video, -out.width, 0, out.width, out.height);
  oc.restore();

  // Gambar AR overlay
  oc.save();
  oc.scale(-1,1);
  oc.drawImage(canvas, -out.width, 0, out.width, out.height);
  oc.restore();

  // Watermark
  oc.fillStyle = 'rgba(0,0,0,0.45)';
  oc.fillRect(0, out.height-40, 172, 40);
  oc.fillStyle = '#e8607a';
  oc.font = 'bold 15px system-ui';
  oc.fillText('⬡ OPSHE Beauty AR', 12, out.height-14);

  // Tampilkan di modal
  out.toBlob(blob => {
    if (lastPhotoUrl) URL.revokeObjectURL(lastPhotoUrl);
    lastPhotoUrl = URL.createObjectURL(blob);
    document.getElementById('photoResult').src = lastPhotoUrl;
    document.getElementById('photoModal').style.display = 'flex';
  }, 'image/jpeg', 0.92);
}

function downloadPhoto() {
  if (!lastPhotoUrl) return;
  const link = document.createElement('a');
  link.href  = lastPhotoUrl;
  const name = shade ? shade.shade_name.replace(/\s+/g,'-') : 'look';
  link.download = `OPSHE-${name}.jpg`;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
}

function closePhoto() {
  document.getElementById('photoModal').style.display = 'none';
}

// ─── Brand & Shade ──────────────────────────────────────────────────────────

async function loadBrands() {
  loadTxt.textContent = 'Memuat data brand...';
  try {
    const res  = await fetch(`${API}/brands`);
    const data = await res.json();
    brandRow.innerHTML = '';
    data.data.forEach((b,i) => {
      const btn = document.createElement('button');
      btn.className = 'brand-btn' + (i===0?' active':'');
      btn.textContent = b.brand_name.replace(' New York','');
      btn.dataset.id  = b.brand_id;
      btn.onclick = () => selectBrand(b.brand_id);
      brandRow.appendChild(btn);
    });
    if (data.data.length > 0) selectBrand(data.data[0].brand_id);
  } catch(e) {
    loadTxt.textContent = 'Gagal memuat. Pastikan server OPSHE jalan!';
  }
}

async function selectBrand(brandId) {
  document.querySelectorAll('.brand-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.id === brandId);
  });
  shadeRow.innerHTML = '<span style="color:#666;font-size:13px;padding:8px">Memuat...</span>';
  const res  = await fetch(`${API}/shades?brand_id=${brandId}&per_page=100`);
  const data = await res.json();
  shadeRow.innerHTML = '';
  data.data.forEach(s => {
    const item = document.createElement('div');
    item.className = 'shade-item';
    item.innerHTML = `
      <div class="shade-circle" style="background:${s.hex}" data-id="${s.shade_id}"></div>
      <div class="shade-label">${s.shade_name}</div>
    `;
    item.onclick = () => {
      shade = s;
      document.querySelectorAll('.shade-circle').forEach(c =>
        c.classList.toggle('active', c.dataset.id === s.shade_id)
      );
      selInfo.innerHTML = `<b>${s.shade_name}</b><br>${s.brand_name} · ${s.hex}`;
      fetch(`${API}/analytics/event`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({event_type:'try', shade_id: s.shade_id})
      }).catch(()=>{});
    };
    shadeRow.appendChild(item);
  });
}

opSlider.addEventListener('input', e => {
  opacity = e.target.value / 100;
  opVal.textContent = e.target.value + '%';
});

finSel.addEventListener('change', e => { finish = e.target.value; });

// ─── Face Mesh ──────────────────────────────────────────────────────────────

async function initFaceMesh() {
  loadTxt.textContent = 'Memuat AI face detection...';
  const faceMesh = new FaceMesh({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
  });
  faceMesh.setOptions({
    maxNumFaces: 1, refineLandmarks: true,
    minDetectionConfidence: 0.5, minTrackingConfidence: 0.5
  });
  faceMesh.onResults(res => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (res.multiFaceLandmarks && res.multiFaceLandmarks.length > 0) {
      const raw = res.multiFaceLandmarks[0];
      landmarks = prevLandmarks
        ? raw.map((lm,i) => ({
            x: lm.x*(1-SMOOTH) + prevLandmarks[i].x*SMOOTH,
            y: lm.y*(1-SMOOTH) + prevLandmarks[i].y*SMOOTH,
            z: lm.z
          }))
        : raw;
      prevLandmarks = landmarks;
      statusDot.style.display = 'block';
      drawLip();
    } else {
      landmarks = null;
      prevLandmarks = null;
      statusDot.style.display = 'none';
    }
  });
  loadTxt.textContent = 'Mengaktifkan kamera...';
  const cam = new Camera(video, {
    onFrame: async () => { await faceMesh.send({image: video}); },
    width: 1280, height: 720
  });
  await cam.start();
  loadTxt.textContent = 'Siap!';
  setTimeout(() => {
    loadEl.style.transition = 'opacity 0.5s';
    loadEl.style.opacity = '0';
    setTimeout(() => loadEl.style.display = 'none', 500);
  }, 600);
}

async function init() {
  await loadBrands();
  await initFaceMesh();
}

init();
</script>
</body>
</html>
